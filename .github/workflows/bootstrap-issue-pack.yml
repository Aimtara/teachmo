name: Bootstrap Issue Pack

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (true/false)"
        required: false
        default: "true"
      update_existing:
        description: "Update existing issues if found (true/false)"
        required: false
        default: "false"
      create_missing:
        description: "Create missing issues (true/false)"
        required: false
        default: "true"
      project_owner:
        description: "Optional project owner login (org/user)"
        required: false
        default: ""
      project_number:
        description: "Optional GitHub Project v2 number"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  projects: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap issue pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          UPDATE_EXISTING: ${{ github.event.inputs.update_existing }}
          CREATE_MISSING: ${{ github.event.inputs.create_missing }}
          PROJECT_OWNER: ${{ github.event.inputs.project_owner }}
          PROJECT_NUMBER: ${{ github.event.inputs.project_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/bootstrap-issue-pack.mjs
