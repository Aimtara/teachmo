name: Scheduled Hasura Permissions Check

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run permissions smoke tests
        env:
          HASURA_GRAPHQL_ENDPOINT: ${{ secrets.HASURA_GRAPHQL_ENDPOINT }}
          TEST_JWT_TEACHER: ${{ secrets.TEST_JWT_TEACHER }}
          TEST_JWT_DISTRICT_ADMIN: ${{ secrets.TEST_JWT_DISTRICT_ADMIN }}
          REQUIRE_HASURA_SMOKE: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
          # Protected contexts must be fail-closed when permission-smoke secrets are missing.
          REQUIRE_HASURA_SMOKE_TRUE_DOCUMENTED: "true"
        run: |
          node scripts/hasura-permissions-smoke.mjs
