name: Project Status Automation

on:
  issues:
    types:
      - opened
      - reopened
      - closed
      - labeled
      - unlabeled
      - assigned
      - unassigned

permissions:
  contents: read
  issues: read
  projects: write

jobs:
  sync-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate issue pack config
        run: node scripts/validate-issue-pack.mjs

      - name: Validate project field configuration
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
        run: node scripts/validate-project-config.mjs

      - name: Sync project status from issue state
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ACTION: ${{ github.event.action }}
        run: node scripts/project-status-automation.mjs
