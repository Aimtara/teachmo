name: Secret Rotation Approval

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "staging or production"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      secret_name:
        description: "Secret to rotate"
        required: true
        default: google-oauth-client-secret
        type: choice
        options:
          - google-oauth-client-secret
          - nhost-admin-secret
          - sentry-auth-token
      execute:
        description: "Execute after protected environment approval"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: secret-rotation-${{ github.event.inputs.target_environment }}-${{ github.event.inputs.secret_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Prepare rotation summary
        env:
          SECRET_ROTATION_APPROVED: "false"
        run: |
          node scripts/ops/secret-rotation.mjs \
            --target "${{ github.event.inputs.target_environment }}" \
            --secret-name "${{ github.event.inputs.secret_name }}" \
            --output-dir artifacts/secret-rotation
      - uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-prepare
          path: artifacts/secret-rotation/

  execute:
    needs: prepare
    if: ${{ github.event.inputs.execute == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_environment == 'production' && 'production-secret-rotation' || 'staging-secret-rotation' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Execute approved rotation
        env:
          SECRET_ROTATION_APPROVED: "true"
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_ROTATION_TOKEN: ${{ secrets.GOOGLE_OAUTH_ROTATION_TOKEN }}
          NHOST_ADMIN_SECRET_VALUE: ${{ secrets.NHOST_ADMIN_SECRET }}
          NHOST_PROJECT_ID: ${{ secrets.NHOST_PROJECT_ID }}
          NHOST_MANAGEMENT_TOKEN: ${{ secrets.NHOST_MANAGEMENT_TOKEN }}
          LOGIN_SMOKE_COMMAND: ${{ vars.LOGIN_SMOKE_COMMAND }}
        run: |
          node scripts/ops/secret-rotation.mjs \
            --target "${{ github.event.inputs.target_environment }}" \
            --secret-name "${{ github.event.inputs.secret_name }}" \
            --execute \
            --output-dir artifacts/secret-rotation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-rotation-execute
          path: artifacts/secret-rotation/
