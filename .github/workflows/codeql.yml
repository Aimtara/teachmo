name: CodeQL

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '34 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default-setup-notice:
    name: CodeQL default setup notice
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm default setup
        run: |
          echo "GitHub CodeQL default setup is enabled for this repository."
          echo "This workflow intentionally avoids uploading advanced CodeQL SARIF to prevent default-setup conflicts."
