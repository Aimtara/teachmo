name: Sync Issue Pack to GitHub Project

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (true/false)"
        required: false
        default: "true"
      project_owner:
        description: "Optional project owner login (org/user)"
        required: false
        default: ""
      project_number:
        description: "Optional GitHub Project v2 number"
        required: false
        default: ""
  push:
    paths:
      - "ops/issue-pack.yml"
      - "scripts/project-sync-issue-pack.mjs"
      - "scripts/issue-pack-core.mjs"

permissions:
  contents: read
  issues: read
  projects: write

jobs:
  project-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate issue pack config
        run: node scripts/validate-issue-pack.mjs

      - name: Validate project field configuration
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_OWNER: ${{ github.event.inputs.project_owner || '' }}
          PROJECT_NUMBER: ${{ github.event.inputs.project_number || '' }}
        run: node scripts/validate-project-config.mjs

      - name: Sync issues to GitHub Project
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PROJECT_OWNER: ${{ github.event.inputs.project_owner || '' }}
          PROJECT_NUMBER: ${{ github.event.inputs.project_number || '' }}
        run: node scripts/project-sync-issue-pack.mjs
