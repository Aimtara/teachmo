name: Issue Pack Child Epic
description: Create a child gate/epic issue compatible with issue-pack automation.
title: "[Issue Pack] Child Epic"
labels:
  - epic
body:
  - type: input
    id: issue_pack_key
    attributes:
      label: Issue pack key marker (HTML comment)
      description: "Enter the full HTML comment marker used by automation (example: <!-- issue-pack-key: gate-0 -->)."
      placeholder: "<!-- issue-pack-key: gate-0 -->"
    validations:
      required: true
  - type: input
    id: parent_reference
    attributes:
      label: Parent issue title
      value: Teachmo Completion Matrix Tracking Issue
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short one-paragraph summary.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Checklist items that must be completed.
      value: "- [ ] Add acceptance criteria"
    validations:
      required: true
