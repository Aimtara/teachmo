schema:
  - ${HASURA_GRAPHQL_ENDPOINT:-${HASURA_GRAPHQL_URL}}:
      headers:
        x-hasura-admin-secret: ${HASURA_GRAPHQL_ADMIN_SECRET}
documents:
  - "src/**/*.{ts,tsx,js,jsx}"
  - "nhost/functions/**/*.{ts,js}"
generates:
  src/api/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
