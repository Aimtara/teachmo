title = "Teachmo secret scanning policy"

[extend]
useDefault = true

[allowlist]
description = "Repository placeholders and documented examples only. Do not add real secrets."
paths = [
  '''docs/readiness/evidence/.*template\.md''',
  '''\.env\.example''',
  '''backend/\.env\.example''',
  '''docs/readiness/manual-production-work\.md''',
  '''docs/readiness/remaining-work-closure-plan\.md''',
]

regexes = [
  '''legal/privacy/AI governance''',
  '''legal/privacy/AI approval''',
]
